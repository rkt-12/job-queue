<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Job Queue Dashboard</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e6e6e6; margin: 0; padding: 24px; }
  h1 { font-size: 18px; color: #8ab4f8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 16px 0; }
  .card { background: #1a1d27; border-radius: 8px; padding: 14px 16px; border: 1px solid #2a2d3a; }
  .card .label { font-size: 12px; color: #9099ab; text-transform: uppercase; letter-spacing: .05em; }
  .card .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
  .dead { color: #f28b82; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #2a2d3a; }
  button { background: #2a2d3a; color: #e6e6e6; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  button:hover { background: #3a3d4a; }
  .stream-row { display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>
  <h1>Job Queue — Live Health</h1>
  <div id="streamCards" class="grid"></div>
  <div id="statusCards" class="grid"></div>
  <h1>Dead Letter Queue</h1>
  <table id="dlqTable">
    <thead><tr><th>ID</th><th>Type</th><th>Queue</th><th>Attempts</th><th>Error</th><th>Failed At</th><th></th></tr></thead>
    <tbody></tbody>
  </table>

<script>
async function refresh() {
  const stats = await fetch('/stats').then(r => r.json());
  const dlq = await fetch('/dlq').then(r => r.json());

  const streamCards = document.getElementById('streamCards');

  const queues = stats.byQueue || {};

  streamCards.innerHTML = Object.entries(queues).map(([name, depth]) => `
  <div class="card">
      <div class="label">${name}</div>
      <div class="value">${depth}</div>
  </div>
  `).join('');

  const statusCards = document.getElementById('statusCards');
  const byStatus = stats.byStatus || {};
  statusCards.innerHTML = Object.entries(byStatus).map(([k, v]) => `
    <div class="card">
      <div class="label">${k}</div>
      <div class="value">${v}</div>
    </div>`).join('') + `
    <div class="card">
      <div class="label">dead letters</div>
      <div class="value dead">${stats.deadLetterCount}</div>
    </div>`;

  const tbody = document.querySelector('#dlqTable tbody');
  tbody.innerHTML = dlq.map(d => `
    <tr>
      <td>${d.id.slice(0,8)}</td>
      <td>${d.type}</td>
      <td>${d.queue}</td>
      <td>${d.attempts}</td>
      <td>${(d.error || '').slice(0,60)}</td>
      <td>${new Date(d.failed_at).toLocaleTimeString()}</td>
      <td><button onclick="replay('${d.id}')">Replay</button></td>
    </tr>`).join('');
}

async function replay(id) {
  await fetch(`/dlq/${id}/replay`, { method: 'POST' });
  refresh();
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
